<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HK Autosync Commitment Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Maps to load React and Lucide Icons via CDN -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.0"
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      BarChart3, TrendingUp, GripHorizontal, Filter, TableProperties, X, Plus, Info, 
      LayoutDashboard, FileText, CalendarDays, DollarSign, Users, AlertTriangle, Target, 
      Upload, RefreshCw, ChevronDown, ChevronUp, Clock, ArrowUpDown, FilterX, Settings, Palette, Download
    } from 'lucide-react';

    // --- DYNAMIC WORKING DAY LOGIC (12 PM HKT Rollover) ---
    const getTodayInfo = (workingDayMap = {}) => {
      const hkTimeStr = new Date().toLocaleString("en-US", { timeZone: "Asia/Hong_Kong" });
      const hkTime = new Date(hkTimeStr);
      
      const businessTime = new Date(hkTime);
      const isBeforeNoon = hkTime.getHours() < 12;
      
      if (isBeforeNoon) {
        businessTime.setDate(businessTime.getDate() - 1); 
      }

      const bizYyyy = businessTime.getFullYear();
      const bizMm = String(businessTime.getMonth() + 1).padStart(2, '0');
      const bizDd = String(businessTime.getDate()).padStart(2, '0');
      
      const displayDate = `${bizDd}/${bizMm}`;
      const lookupDate = `${bizYyyy}-${bizMm}-${bizDd}`;

      const workingDay = workingDayMap[lookupDate] || { mtd: '?', fullMonth: '?' };
      
      return { display: displayDate, workingDay, isBeforeNoon };
    };

    const parseWorkingDays = (csvText) => {
      const lines = csvText.split('\n');
      const map = {};
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        if (row.length >= 3) {
          let dateStr = row[0].replace(/"/g, '').trim();
          dateStr = dateStr.split(' ')[0]; 
          
          const d = new Date(dateStr);
          if (!isNaN(d.getTime())) {
              const yyyy = d.getFullYear();
              const mm = String(d.getMonth() + 1).padStart(2, '0');
              const dd = String(d.getDate()).padStart(2, '0');
              const formattedDate = `${yyyy}-${mm}-${dd}`;
              
              const mtd = parseInt(row[1].replace(/"/g, '').trim(), 10);
              const fm = parseInt(row[2].replace(/"/g, '').trim(), 10);
              map[formattedDate] = { mtd, fullMonth: fm };
          }
        }
      }
      return map;
    };

    // --- DATA CLEANING HELPERS ---
    const cleanNum = (val) => {
      if (val === undefined || val === null) return 0;
      const str = String(val).replace(/[^0-9.-]+/g, '');
      const num = parseFloat(str);
      return isNaN(num) ? 0 : num;
    };

    const isValidTherapistRow = (row) => {
      const t = (row.therapist || '').toLowerCase().trim();
      return t !== 'total' && t !== 'aggregate' && t !== '';
    };

    const getUniqueValues = (data, field) => {
      return [...new Set(data.filter(isValidTherapistRow).map(d => d[field]))].filter(val => {
        const v = (val || '').toLowerCase();
        return v !== 'total' && v !== 'aggregate' && v !== 'all' && v !== 'other centers';
      });
    };

    // --- ROBUST SALES CSV PARSER ---
    const parseCSV = (csvText) => {
      const lines = [];
      let currentLine = [];
      let currentField = '';
      let inQuotes = false;
      
      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const nextChar = csvText[i + 1];
        
        if (char === '"' && inQuotes && nextChar === '"') {
          currentField += '"';
          i++; 
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          currentLine.push(currentField.trim());
          currentField = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && nextChar === '\n') i++; 
          currentLine.push(currentField.trim());
          lines.push(currentLine);
          currentLine = [];
          currentField = '';
        } else {
          currentField += char;
        }
      }
      if (currentField || csvText[csvText.length - 1] === ',') {
        currentLine.push(currentField.trim());
      }
      if (currentLine.length > 0) {
        lines.push(currentLine);
      }

      if (lines.length < 2) return [];

      const headers = lines[0].map(h => h.replace(/"/g, '').toLowerCase().trim());
      const getIdx = (str) => headers.findIndex(h => h.includes(str.toLowerCase().trim()));

      const cBrand = getIdx('brand') !== -1 ? getIdx('brand') : 0;
      const cCenter = getIdx('center') !== -1 ? getIdx('center') : 2;
      const cTherapist = getIdx('therapist') !== -1 ? getIdx('therapist') : 3;
      const cPosition = getIdx('position') !== -1 ? getIdx('position') : 5;
      
      const cSalesMtd = getIdx('actual sales (mtd)') !== -1 ? getIdx('actual sales (mtd)') : 7;
      const cTargetMtd = getIdx('mtd target') !== -1 ? getIdx('mtd target') : 8;
      const cTargetFm = getIdx('full month target') !== -1 ? getIdx('full month target') : 9;
      
      const cT3 = getIdx('t-3 sales') !== -1 ? getIdx('t-3 sales') : 16;
      const cT2 = getIdx('t-2 sales') !== -1 ? getIdx('t-2 sales') : 19;
      const cT1 = getIdx('t-1 sales') !== -1 ? getIdx('t-1 sales') : 22;
      const cToday = getIdx('today sales') !== -1 ? getIdx('today sales') : 25;

      const parsedData = [];
      for (let i = 1; i < lines.length; i++) {
        const row = lines[i];
        if (row.length > 10) { 
          parsedData.push({
            id: i,
            brand: (row[cBrand] || '').replace(/"/g, '').trim(),
            center: (row[cCenter] || '').replace(/"/g, '').trim(),
            therapist: (row[cTherapist] || '').replace(/"/g, '').trim(),
            position: (row[cPosition] || '').replace(/"/g, '').trim(),
            
            actualSalesMtd: cleanNum(row[cSalesMtd]),
            mtdTarget: cleanNum(row[cTargetMtd]),
            fmTarget: cleanNum(row[cTargetFm]),
            
            t3Sales: cleanNum(row[cT3]),
            t2Sales: cleanNum(row[cT2]),
            t1Sales: cleanNum(row[cT1]),
            todaySales: cleanNum(row[cToday]),
          });
        }
      }
      return parsedData;
    };

    const formatValue = (value, format) => {
      if (value === undefined || value === null) return '-';
      if (format === 'pct') return `${value.toFixed(2)}%`;
      if (format === 'currency') return `$${value.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
      if (format === 'number') return `${value.toLocaleString()}`;
      return value;
    };

    const formatShortNum = (value, prefix = '') => {
      if (value === undefined || value === null || isNaN(value)) return prefix + '0';
      const absVal = Math.abs(value);
      const sign = value < 0 ? '-' : '';
      if (absVal >= 1000000) return sign + prefix + (absVal / 1000000).toFixed(2).replace(/\.00$/, '') + 'M';
      if (absVal >= 1000) return sign + prefix + (absVal / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
      return sign + prefix + Math.round(absVal).toString();
    };

    // Global Highlighting Evaluator
    const getHighlightStyle = (val, runRate, settings) => {
        // Cascade from highest threshold down to lowest
        if (val >= runRate * settings.rule1.multiplier) return { color: settings.rule1.color, fontWeight: '800' };
        if (val >= runRate * settings.rule2.multiplier) return { color: settings.rule2.color, fontWeight: '800' };
        if (val >= runRate * settings.rule3.multiplier) return { color: settings.rule3.color, fontWeight: '800' };
        if (val >= settings.rule4.value) return { color: settings.rule4.color, fontWeight: '800' };
        if (val >= settings.rule5.value) return { color: settings.rule5.color, fontWeight: '800' };
        return { color: settings.rule6.color, fontWeight: '800' };
    };

    // ------------------------------------------------------------------------------------
    // PAGE 1: SALES OVERVIEW COMPONENT
    // ------------------------------------------------------------------------------------
    function SalesOverview({ rawData, todayInfo, hlSettings, runRate }) {
      const [kpiBrand, setKpiBrand] = useState('All');
      const [kpiCenter, setKpiCenter] = useState('All');
      const [kpiPosition, setKpiPosition] = useState('All');
      const [kpiTherapist, setKpiTherapist] = useState('All');
      
      const [showExtraKpis, setShowExtraKpis] = useState(false);
      const [showChart, setShowChart] = useState(false);
      
      // Global Dynamic Custom Thresholds
      const [mtdThreshold1, setMtdThreshold1] = useState(100);
      const [mtdThreshold2, setMtdThreshold2] = useState(150);
      const [mtdThreshold3, setMtdThreshold3] = useState(200);
      const [fmTargetThreshold, setFmTargetThreshold] = useState(75000); // Dollar threshold
      const [salesThreshold, setSalesThreshold] = useState(100000); // Dollar threshold

      const [consoleBrand, setConsoleBrand] = useState('All');
      const [consoleCenter, setConsoleCenter] = useState('All');
      const [consolePosition, setConsolePosition] = useState('All');
      const [consoleTherapist, setConsoleTherapist] = useState('All');

      const [consoleFields, setConsoleFields] = useState([]);
      const [draggedItem, setDraggedItem] = useState(null); 
      const [dragOverIndex, setDragOverIndex] = useState(null);
      
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
      const [tableRules, setTableRules] = useState([]); 

      const REPORT_FIELDS = useMemo(() => [
        { id: 'brand', label: 'Brand', type: 'dimension', category: 'dimension', color: 'bg-indigo-100 text-indigo-700 border-indigo-200 hover:bg-indigo-200' },
        { id: 'center', label: 'Center', type: 'dimension', category: 'dimension', color: 'bg-indigo-100 text-indigo-700 border-indigo-200 hover:bg-indigo-200' },
        { id: 'position', label: 'Position', type: 'dimension', category: 'dimension', color: 'bg-indigo-100 text-indigo-700 border-indigo-200 hover:bg-indigo-200' },
        { id: 'therapist', label: 'Therapist', type: 'dimension', category: 'dimension', color: 'bg-indigo-100 text-indigo-700 border-indigo-200 hover:bg-indigo-200' },
        
        { id: 'actualSalesMtd', label: 'Actual Sales (MTD)', type: 'metric', category: 'currency', format: 'currency', color: 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200' },
        { id: 'mtdTarget', label: 'MTD Target', type: 'metric', category: 'currency', format: 'currency', color: 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200' },
        { id: 'fmTarget', label: 'Full Month Target', type: 'metric', category: 'currency', format: 'currency', color: 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200' },
        { id: 'todaySales', label: 'Today Sales', type: 'metric', category: 'currency', format: 'currency', color: 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200' },
        { id: 't1Sales', label: 'T-1 Sales', type: 'metric', category: 'currency', format: 'currency', color: 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200' },
        { id: 't2Sales', label: 'T-2 Sales', type: 'metric', category: 'currency', format: 'currency', color: 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200' },
        { id: 't3Sales', label: 'T-3 Sales', type: 'metric', category: 'currency', format: 'currency', color: 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200' },
        
        { id: 'mtdPct', label: 'MTD %', type: 'metric', category: 'percentage', format: 'pct', color: 'bg-teal-100 text-teal-700 border-teal-200 hover:bg-teal-200' },
        { id: 'fmSalesPct', label: 'Full Month Sales %', type: 'metric', category: 'percentage', format: 'pct', color: 'bg-teal-100 text-teal-700 border-teal-200 hover:bg-teal-200' },
        { id: 'therapistPct', label: 'Therapist %', type: 'metric', category: 'percentage', format: 'pct', color: 'bg-teal-100 text-teal-700 border-teal-200 hover:bg-teal-200' },
        { id: 'therapistPctMtd1', label: `Therapist % (MTD > ${mtdThreshold1}%)`, type: 'metric', category: 'percentage', format: 'pct', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        { id: 'therapistPctMtd2', label: `Therapist % (MTD > ${mtdThreshold2}%)`, type: 'metric', category: 'percentage', format: 'pct', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        { id: 'therapistPctMtd3', label: `Therapist % (MTD > ${mtdThreshold3}%)`, type: 'metric', category: 'percentage', format: 'pct', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        { id: 'therapistPctFm', label: `Therapist % (FM Target > $${fmTargetThreshold.toLocaleString()})`, type: 'metric', category: 'percentage', format: 'pct', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        { id: 'therapistPctSales', label: `Therapist % (Sales > $${salesThreshold.toLocaleString()})`, type: 'metric', category: 'percentage', format: 'pct', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        
        { id: 'therapistCount', label: 'Count of Therapist', type: 'metric', category: 'count', format: 'number', color: 'bg-blue-100 text-blue-700 border-blue-200 hover:bg-blue-200' },
        { id: 'allTherapistCount', label: 'All Count of Therapist', type: 'metric', category: 'count', format: 'number', color: 'bg-blue-100 text-blue-700 border-blue-200 hover:bg-blue-200' },
        { id: 'therapistCountMtd1', label: `Count (MTD > ${mtdThreshold1}%)`, type: 'metric', category: 'count', format: 'number', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        { id: 'therapistCountMtd2', label: `Count (MTD > ${mtdThreshold2}%)`, type: 'metric', category: 'count', format: 'number', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        { id: 'therapistCountMtd3', label: `Count (MTD > ${mtdThreshold3}%)`, type: 'metric', category: 'count', format: 'number', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        { id: 'therapistCountFm', label: `Count (FM Target > $${fmTargetThreshold.toLocaleString()})`, type: 'metric', category: 'count', format: 'number', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
        { id: 'therapistCountSales', label: `Count (Sales > $${salesThreshold.toLocaleString()})`, type: 'metric', category: 'count', format: 'number', color: 'bg-fuchsia-50 text-fuchsia-700 border-fuchsia-400 border-dashed border-2 hover:bg-fuchsia-100', isCustom: true },
      ], [mtdThreshold1, mtdThreshold2, mtdThreshold3, fmTargetThreshold, salesThreshold]);

      const kpiFilteredData = useMemo(() => {
        return rawData.filter(row => {
          if (!isValidTherapistRow(row)) return false; 
          const matchBrand = kpiBrand === 'All' || row.brand === kpiBrand;
          const matchCenter = kpiCenter === 'All' || row.center === kpiCenter;
          const matchPosition = kpiPosition === 'All' || row.position === kpiPosition;
          const matchTherapist = kpiTherapist === 'All' || row.therapist === kpiTherapist;
          return matchBrand && matchCenter && matchPosition && matchTherapist;
        });
      }, [rawData, kpiBrand, kpiCenter, kpiPosition, kpiTherapist]);

      const summary = useMemo(() => {
        let totalMtdSales = 0, totalTodaySales = 0, totalT1Sales = 0, totalTarget = 0, totalFmTarget = 0;
        
        kpiFilteredData.forEach(row => {
          totalMtdSales += row.actualSalesMtd || 0;
          totalTodaySales += row.todaySales || 0;
          totalT1Sales += row.t1Sales || 0;
        });

        const isKpiFilteredBySubLevel = kpiPosition !== 'All' || kpiTherapist !== 'All';

        let sourceRow = null;
        if (!isKpiFilteredBySubLevel) {
            if (kpiCenter !== 'All') {
                sourceRow = rawData.find(r => r.center.toLowerCase() === kpiCenter.toLowerCase() && r.therapist.toLowerCase() === 'total');
            } else if (kpiBrand !== 'All') {
                sourceRow = rawData.find(r => r.brand.toLowerCase() === kpiBrand.toLowerCase() && r.center.toLowerCase() === 'total' && r.therapist.toLowerCase() === 'total');
            }
        }

        if (sourceRow) {
            totalTarget = sourceRow.mtdTarget;
            totalFmTarget = sourceRow.fmTarget;
        } else if (!isKpiFilteredBySubLevel && kpiBrand === 'All' && kpiCenter === 'All') {
            const brandTotalRows = rawData.filter(r => r.center.toLowerCase() === 'total' && r.therapist.toLowerCase() === 'total' && r.brand && !r.brand.toLowerCase().includes('total'));
            if (brandTotalRows.length > 0) {
                totalTarget = brandTotalRows.reduce((s, r) => s + r.mtdTarget, 0);
                totalFmTarget = brandTotalRows.reduce((s, r) => s + r.fmTarget, 0);
            } else {
                totalTarget = kpiFilteredData.reduce((s, r) => s + r.mtdTarget, 0);
                totalFmTarget = kpiFilteredData.reduce((s, r) => s + r.fmTarget, 0);
            }
        } else {
            totalTarget = kpiFilteredData.reduce((s, r) => s + r.mtdTarget, 0);
            totalFmTarget = kpiFilteredData.reduce((s, r) => s + r.fmTarget, 0);
        }

        return {
          totalMtdSales,
          totalTodaySales,
          totalT1Sales,
          totalTarget,
          totalFmTarget,
          mtdPct: totalTarget > 0 ? (totalMtdSales / totalTarget) * 100 : 0, 
          fmSalesPct: totalFmTarget > 0 ? (totalMtdSales / totalFmTarget) * 100 : 0,
          headcount: kpiFilteredData.length 
        };
      }, [kpiFilteredData, rawData, kpiBrand, kpiCenter, kpiPosition, kpiTherapist]);

      const fmDay = todayInfo?.workingDay?.fullMonth !== '?' ? Number(todayInfo?.workingDay?.fullMonth) : 1;
      const mtdDay = todayInfo?.workingDay?.mtd !== '?' ? Number(todayInfo?.workingDay?.mtd) : 1;
      
      const t1Target = (summary.totalFmTarget / fmDay) * Math.max(0, mtdDay - 1);
      const t1MtdSales = summary.totalMtdSales - summary.totalT1Sales;
      const t1MtdPct = t1Target > 0 ? (t1MtdSales / t1Target) * 100 : 0;

      const consoleFilteredData = useMemo(() => {
        return rawData.filter(row => {
          if (!isValidTherapistRow(row)) return false; 
          const matchBrand = consoleBrand === 'All' || row.brand === consoleBrand;
          const matchCenter = consoleCenter === 'All' || row.center === consoleCenter;
          const matchPosition = consolePosition === 'All' || row.position === consolePosition;
          const matchTherapist = consoleTherapist === 'All' || row.therapist === consoleTherapist;
          return matchBrand && matchCenter && matchPosition && matchTherapist;
        });
      }, [rawData, consoleBrand, consoleCenter, consolePosition, consoleTherapist]);

      const activeDimensions = consoleFields.filter(f => f.type === 'dimension');

      const ruledRawData = useMemo(() => {
        if (tableRules.length === 0) return consoleFilteredData;
        return consoleFilteredData.filter(row => {
          return tableRules.every(rule => {
            if (!rule.field || !rule.operator || rule.value === '') return true;
            
            const fieldDef = REPORT_FIELDS.find(f => f.id === rule.field);
            let rowVal = row[rule.field];
            let compareVal = rule.value;

            const isTextOperator = ['contains', 'not_contains', 'starts_with', 'ends_with'].includes(rule.operator);

            if (rule.field === 'mtdPct') {
                rowVal = row.mtdTarget > 0 ? (row.actualSalesMtd / row.mtdTarget) * 100 : 0;
            } else if (rule.field === 'fmSalesPct') {
                rowVal = row.fmTarget > 0 ? (row.actualSalesMtd / row.fmTarget) * 100 : 0;
            }

            if (fieldDef && (fieldDef.type === 'metric') && !isTextOperator) {
               rowVal = Number(rowVal);
               compareVal = Number(compareVal);
               if (isNaN(rowVal) || isNaN(compareVal)) return true;
            } else {
               if (rowVal === undefined || rowVal === null) return false;
               rowVal = String(rowVal).toLowerCase();
               compareVal = String(compareVal).toLowerCase();
            }
            
            switch(rule.operator) {
              case '>': return rowVal > compareVal;
              case '>=': return rowVal >= compareVal;
              case '<': return rowVal < compareVal;
              case '<=': return rowVal <= compareVal;
              case '=': return rowVal === compareVal;
              case 'contains': return rowVal.includes(compareVal);
              case 'not_contains': return !rowVal.includes(compareVal);
              case 'starts_with': return rowVal.startsWith(compareVal);
              case 'ends_with': return rowVal.endsWith(compareVal);
              default: return true;
            }
          });
        });
      }, [consoleFilteredData, tableRules, REPORT_FIELDS]);

      const groupedConsoleData = useMemo(() => {
        if (consoleFields.length === 0) return [];
        const map = new Map();

        ruledRawData.forEach(row => {
          const key = activeDimensions.length > 0 ? activeDimensions.map(d => row[d.id]).join(' | ') : 'Grand Total';
          
          const rowMtdPct = row.mtdTarget > 0 ? (row.actualSalesMtd / row.mtdTarget) * 100 : 0;
          
          const isOverMtd1 = rowMtdPct > mtdThreshold1 ? 1 : 0;
          const isOverMtd2 = rowMtdPct > mtdThreshold2 ? 1 : 0;
          const isOverMtd3 = rowMtdPct > mtdThreshold3 ? 1 : 0;
          const isOverFm = row.fmTarget > fmTargetThreshold ? 1 : 0;
          const isOverSales = row.actualSalesMtd > salesThreshold ? 1 : 0;

          if (!map.has(key)) {
            const initialGroup = { id: key };
            activeDimensions.forEach(d => { initialGroup[d.id] = row[d.id] });
            initialGroup._actualSalesMtd = row.actualSalesMtd || 0;
            initialGroup._mtdTarget = row.mtdTarget || 0;
            initialGroup._fmTarget = row.fmTarget || 0;
            initialGroup._todaySales = row.todaySales || 0;
            initialGroup._t1Sales = row.t1Sales || 0;
            initialGroup._t2Sales = row.t2Sales || 0;
            initialGroup._t3Sales = row.t3Sales || 0;
            initialGroup._therapistCount = 1;
            initialGroup._therapistCountMtd1 = isOverMtd1;
            initialGroup._therapistCountMtd2 = isOverMtd2;
            initialGroup._therapistCountMtd3 = isOverMtd3;
            initialGroup._therapistCountFm = isOverFm;
            initialGroup._therapistCountSales = isOverSales;
            map.set(key, initialGroup);
          } else {
            const group = map.get(key);
            group._actualSalesMtd += row.actualSalesMtd || 0;
            group._mtdTarget += row.mtdTarget || 0;
            group._fmTarget += row.fmTarget || 0;
            group._todaySales += row.todaySales || 0;
            group._t1Sales += row.t1Sales || 0;
            group._t2Sales += row.t2Sales || 0;
            group._t3Sales += row.t3Sales || 0;
            group._therapistCount += 1;
            group._therapistCountMtd1 += isOverMtd1;
            group._therapistCountMtd2 += isOverMtd2;
            group._therapistCountMtd3 += isOverMtd3;
            group._therapistCountFm += isOverFm;
            group._therapistCountSales += isOverSales;

        });

        return Array.from(map.values()).map(group => {
          const hasTherapist = activeDimensions.some(d => d.id === 'therapist');
          const hasPosition = activeDimensions.some(d => d.id === 'position');
          const hasCenter = activeDimensions.some(d => d.id === 'center');

          const isFilteredBySubLevel = consolePosition !== 'All' || consoleTherapist !== 'All';
          const isFilteredByCenter = consoleCenter !== 'All';

          let unfilteredMatchCount = 0;
          if (activeDimensions.length === 0) {
              unfilteredMatchCount = rawData.filter(isValidTherapistRow).length;
          } else {
              rawData.forEach(rawRow => {
                  if (!isValidTherapistRow(rawRow)) return;
                  let isMatch = true;
                  for (const dim of activeDimensions) {
                      if (rawRow[dim.id] !== group[dim.id]) {
                          isMatch = false;
                          break;
                      }
                  }
                  if (isMatch) unfilteredMatchCount++;
              });
          }

          let sourceRow = null;
          if (!hasTherapist && !hasPosition && !isFilteredBySubLevel) {
              if (hasCenter) {
                  sourceRow = rawData.find(r => r.center.toLowerCase() === group.center?.toLowerCase() && r.therapist.toLowerCase() === 'total');
              } else if (hasBrand) {
                  if (isFilteredByCenter) {
                      sourceRow = rawData.find(r => r.center.toLowerCase() === consoleCenter.toLowerCase() && r.therapist.toLowerCase() === 'total');
                  } else {
                      sourceRow = rawData.find(r => r.brand.toLowerCase() === group.brand?.toLowerCase() && r.center.toLowerCase() === 'total' && r.therapist.toLowerCase() === 'total');
                  }
              } else {
                  if (isFilteredByCenter) {
                      sourceRow = rawData.find(r => r.center.toLowerCase() === consoleCenter.toLowerCase() && r.therapist.toLowerCase() === 'total');
                  } else if (consoleBrand !== 'All') {
                      sourceRow = rawData.find(r => r.brand.toLowerCase() === consoleBrand.toLowerCase() && r.center.toLowerCase() === 'total' && r.therapist.toLowerCase() === 'total');
                  }

          let finalTodaySales = group._todaySales;
          let finalT1Sales = group._t1Sales;
          let finalT2Sales = group._t2Sales;
          let finalT3Sales = group._t3Sales;

          let finalMtdTarget = sourceRow ? sourceRow.mtdTarget : group._mtdTarget;
          let finalFmTarget = sourceRow ? sourceRow.fmTarget : group._fmTarget;
          
          if (!sourceRow && !hasTherapist && !hasPosition && !hasCenter && !hasBrand && !isFilteredBySubLevel) {

              if (brandTotalRows.length > 0) {

          group.therapistCountMtd2 = group._therapistCountMtd2;
          group.therapistCountMtd3 = group._therapistCountMtd3;
          group.therapistCountFm = group._therapistCountFm;
          group.therapistCountSales = group._therapistCountSales;

          group.therapistPct = unfilteredMatchCount > 0 ? (group._therapistCount / unfilteredMatchCount) * 100 : 0;
          group.therapistPctMtd1 = unfilteredMatchCount > 0 ? (group._therapistCountMtd1 / unfilteredMatchCount) * 100 : 0;
          group.therapistPctMtd2 = unfilteredMatchCount > 0 ? (group._therapistCountMtd2 / unfilteredMatchCount) * 100 : 0;
          group.therapistPctMtd3 = unfilteredMatchCount > 0 ? (group._therapistCountMtd3 / unfilteredMatchCount) * 100 : 0;
          group.therapistPctFm = unfilteredMatchCount > 0 ? (group._therapistCountFm / unfilteredMatchCount) * 100 : 0;
          group.therapistPctSales = unfilteredMatchCount > 0 ? (group._therapistCountSales / unfilteredMatchCount) * 100 : 0;

          group.mtdTarget = finalMtdTarget;
          group.fmTarget = finalFmTarget;

              aVal = aVal.toLowerCase();
              bVal = bVal.toLowerCase();
            }
            
            if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
            if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return sortableItems;

           <div onDragOver={handleDragOverArea} onDrop={handleDropArea} className={`min-h-[80px] rounded-xl border-2 transition-colors flex flex-wrap items-center gap-2 p-4 ${consoleFields.length === 0 ? 'border-dashed border-slate-300 bg-slate-50 justify-center' : 'border-dashed border-indigo-200 bg-indigo-50/30'}`}>

                                value={rule.operator}

                              >
                                 <optgroup label="Numbers">
                                   <option value=">">is greater than (&gt;)</option>
                                   <option value=">=">is greater or equal (&gt;=)</option>
                                   <option value="<">is less than (&lt;)</option>
                                   <option value="<=">is less or equal (&lt;=)</option>
                                   <option value="=">is exactly (=)</option>
                                 </optgroup>
                                 <optgroup label="Text Matching">
                                   <option value="contains">contains</option>
                                   <option value="not_contains">does not contain</option>
                                   <option value="starts_with">starts with</option>
                                   <option value="ends_with">ends with</option>
                                 </optgroup>
                              </select>
                              <input 
                                type="text" 
                                placeholder="Value..."
                                className="bg-white border border-slate-200 rounded px-2 py-1 outline-none focus:ring-1 focus:ring-blue-500 shadow-sm w-32"
                                value={rule.value} 
                                onChange={(e) => updateRule(rule.id, 'value', e.target.value)} 
                              />
                              <button onClick={() => removeRule(rule.id)} className="p-1 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded transition-colors ml-auto">
                                <X className="w-4 h-4"/>
                              </button>
                            </div>
                         ))}
                       </div>
                     )}
                   </div>

                 </div>
               )}
            </div>

            {/* Render Output Table */}
            <div className="overflow-x-auto">
              {consoleFields.length > 0 ? (
                <table className="w-full text-left text-sm text-slate-600">
                  <thead className="bg-slate-100 text-slate-600 uppercase text-xs font-semibold border-b border-slate-200">
                    <tr>
                      {consoleFields.map(field => {
                        const displayLabel = REPORT_FIELDS.find(f => f.id === field.id)?.label || field.label;
                        return (
                          <th 
                            key={field.id} 
                            className="px-5 py-4 whitespace-nowrap cursor-pointer select-none hover:bg-slate-200 transition-colors"
                            onClick={() => requestSort(field.id)}
                          >
                            <div className="flex items-center gap-1.5">
                              {displayLabel}
                              {sortConfig.key === field.id ? (
                                sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 text-blue-600" /> : <ChevronDown className="w-3 h-3 text-blue-600" />
                              ) : (
                                <ArrowUpDown className="w-3 h-3 opacity-30" />
                              )}
                            </div>
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {sortedConsoleData.length > 0 ? sortedConsoleData.map((row, idx) => (
                      <tr key={idx} className="hover:bg-slate-50 transition-colors">
                        {consoleFields.map(field => (
                          <td 
                            key={field.id} 
                            className={`px-5 py-3 ${field.category !== 'dimension' && field.category !== 'threshold' ? 'font-medium text-slate-800' : ''}`}
                            style={field.id === 'mtdPct' ? getHighlightStyle(row[field.id], runRate, hlSettings) : {}}
                          >
                            {field.type === 'dimension' || field.type === 'threshold' ? (row[field.id] || '-') : formatValue(row[field.id], field.format)}
                          </td>
                        ))}
                      </tr>
                    )) : (
                      <tr><td colSpan={consoleFields.length} className="px-5 py-8 text-center text-slate-500">No data matches your current filters or rules.</td></tr>
                    )}
                  </tbody>
                </table>
              ) : (
                <div className="px-5 py-12 text-center text-slate-400 bg-slate-50/50">Table preview will appear here once fields are added to the console.</div>
              )}
            </div>
            
            {sortedConsoleData.length > 0 && (
               <div className="p-4 bg-slate-50 flex justify-between text-xs text-slate-500 border-t border-slate-200">
                 <span>Showing aggregations based on selected Dimensions and Filter Rules.</span>
                 <span>Total Rows: {sortedConsoleData.length}</span>
               </div>
            )}

            {/* BAR CHART SECTION */}
            {consoleFields.length > 0 && sortedConsoleData.length > 0 && (
              <div className="p-4 bg-white border-t border-slate-200">
                <button onClick={() => setShowChart(!showChart)} className="flex items-center gap-2 text-sm font-bold text-slate-700 hover:text-indigo-600 transition-colors">
                   <BarChart3 className="w-4 h-4" /> {showChart ? 'Hide Dynamic Bar Chart' : 'Show Dynamic Bar Chart'}
                </button>
                
                {showChart && (
                   <div className="mt-6">
                      {(() => {
                         const chartMetric = consoleFields.find(f => f.type === 'metric');
                         const chartDim = consoleFields.find(f => f.type === 'dimension');
                         
                         if (!chartMetric) return <p className="text-sm text-slate-500 italic mt-2">Please add at least one metric to the console to visualize data.</p>;
                         
                         // Limit to top 30 for visualization layout safety
                         const chartData = sortedConsoleData.slice(0, 30);
                         const maxVal = Math.max(...chartData.map(d => Number(d[chartMetric.id]) || 0));
                         
                         return (
                           <div className="flex flex-col gap-2">
                             <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 flex justify-between">
                               <span>{REPORT_FIELDS.find(f => f.id === chartMetric.id)?.label || chartMetric.label} by {chartDim ? (REPORT_FIELDS.find(f => f.id === chartDim.id)?.label || chartDim.label) : 'Grand Total'} {sortedConsoleData.length > 30 ? '(Top 30)' : ''}</span>

                             </h4>
                             <div className="flex items-end gap-2 h-64 bg-slate-50 border border-slate-100 rounded-lg px-4 pt-4 pb-8 overflow-x-auto relative shadow-inner">

    // ------------------------------------------------------------------------------------
    // PAGE 2: CAT 1/2 COMPONENT (Defect Dashboard)
    // ------------------------------------------------------------------------------------
    function Cat12Overview({ rawData, hlSettings, runRate }) {
      const [filterBrand, setFilterBrand] = useState('All');
      const [filterCenter, setFilterCenter] = useState('All');
      const [sortConfig, setSortConfig] = useState({ key: 'defectHc', direction: 'desc' });

      const catFilteredData = useMemo(() => {
        return rawData.filter(row => {
          if (!isValidTherapistRow(row)) return false;
          const matchBrand = filterBrand === 'All' || row.brand === filterBrand;
          const matchCenter = filterCenter === 'All' || row.center === filterCenter;
          return matchBrand && matchCenter;
        });
      }, [rawData, filterBrand, filterCenter]);

      const catAvailableCenters = useMemo(() => getUniqueValues(rawData.filter(d => filterBrand === 'All' || d.brand === filterBrand), 'center'), [rawData, filterBrand]);

      const centerStats = useMemo(() => {
        const map = new Map();
        catFilteredData.forEach(row => {
          if (!map.has(row.center)) map.set(row.center, { center: row.center, therapists: [], totalSales: 0, totalTarget: 0 });
          const group = map.get(row.center);
          group.therapists.push(row);
          group.totalSales += row.actualSalesMtd || 0;
          group.totalTarget += row.mtdTarget || 0;
        });

        const unsortedStats = Array.from(map.values()).map(group => {
          let defectCount = 0;
          group.therapists.forEach(t => {
            const mtdPct = t.mtdTarget > 0 ? (t.actualSalesMtd / t.mtdTarget) * 100 : 0;
            if (mtdPct < 100) defectCount++; 
          });
          const hc = group.therapists.length;
          
          const centerTotalRow = rawData.find(r => r.center.toLowerCase() === group.center.toLowerCase() && r.therapist.toLowerCase() === 'total');
          const finalTarget = centerTotalRow ? centerTotalRow.mtdTarget : group.totalTarget;
          const finalSales = centerTotalRow ? centerTotalRow.actualSalesMtd : group.totalSales; 

          return {
            center: group.center,
            hc: hc,
            defectHc: defectCount,
            defectPct: hc > 0 ? (defectCount / hc) * 100 : 0,
            totalSales: finalSales,
            totalTarget: finalTarget,
            groupMtdPct: finalTarget > 0 ? (finalSales / finalTarget) * 100 : 0,
          };
        });

        if (sortConfig.key) {
          unsortedStats.sort((a, b) => {
            let aVal = a[sortConfig.key];
            let bVal = b[sortConfig.key];
            if (typeof aVal === 'string') aVal = aVal.toLowerCase();
            if (typeof bVal === 'string') bVal = bVal.toLowerCase();
            if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
            if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return unsortedStats;
      }, [catFilteredData, rawData, sortConfig]);

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
        setSortConfig({ key, direction });
      };

      const globalHc = centerStats.reduce((sum, c) => sum + c.hc, 0);
      const globalDefectHc = centerStats.reduce((sum, c) => sum + c.defectHc, 0);
      const globalDefectRate = globalHc > 0 ? (globalDefectHc / globalHc) * 100 : 0;

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          
          <section className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <div className="flex items-center gap-2 mb-4 text-slate-700 font-semibold">
              <Filter className="w-4 h-4 text-orange-500" />
              <h2>Defect Analysis Filters</h2>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <select className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 outline-none focus:ring-2 focus:ring-orange-500" value={filterBrand} onChange={(e) => { setFilterBrand(e.target.value); setFilterCenter('All'); }}>
                <option value="All">All Brands</option>
                {getUniqueValues(rawData, 'brand').map(b => <option key={b} value={b} className="capitalize">{b}</option>)}
              </select>
              <select className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 outline-none focus:ring-2 focus:ring-orange-500 disabled:opacity-50" value={filterCenter} onChange={(e) => setFilterCenter(e.target.value)} disabled={catAvailableCenters.length === 0}>
                <option value="All">All Centers</option>
                {catAvailableCenters.map(f => <option key={f} value={f}>{f}</option>)}
              </select>
            </div>
          </section>

          <section className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
              <div className="p-3 bg-blue-100 text-blue-600 rounded-lg"><Users className="w-6 h-6" /></div>
              <div><p className="text-sm text-slate-500 font-medium">Total HC</p><h3 className="text-2xl font-bold text-slate-800">{globalHc}</h3></div>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
              <div className="p-3 bg-red-100 text-red-600 rounded-lg"><AlertTriangle className="w-6 h-6" /></div>
              <div><p className="text-sm text-slate-500 font-medium">Defect HC (MTD &lt; 100%)</p><h3 className="text-2xl font-bold text-red-600">{globalDefectHc}</h3></div>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
              <div className="p-3 bg-orange-100 text-orange-600 rounded-lg"><Target className="w-6 h-6" /></div>
              <div><p className="text-sm text-slate-500 font-medium">Defect Rate</p><h3 className="text-2xl font-bold text-slate-800">{globalDefectRate.toFixed(1)}%</h3></div>
            </div>
          </section>

          <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-5 border-b border-slate-200 bg-slate-50 flex items-center gap-2">
               <FileText className="w-5 h-5 text-orange-600" />
               <h2 className="text-lg font-bold text-slate-800">Defect Breakdown by Center</h2>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-left text-sm text-slate-600">
                <thead className="bg-slate-100 text-slate-600 uppercase text-xs font-semibold border-b border-slate-200">
                  <tr>
                    <th className="px-5 py-4 cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('center')}>
                      <div className="flex items-center justify-start gap-1">Center {sortConfig.key === 'center' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 text-orange-500" /> : <ChevronDown className="w-3 h-3 text-orange-500" />) : <ArrowUpDown className="w-3 h-3 opacity-30" />}</div>
                    </th>
                    <th className="px-5 py-4 text-center cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('hc')}>
                      <div className="flex items-center justify-center gap-1">Headcount (HC) {sortConfig.key === 'hc' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 text-orange-500" /> : <ChevronDown className="w-3 h-3 text-orange-500" />) : <ArrowUpDown className="w-3 h-3 opacity-30" />}</div>
                    </th>
                    <th className="px-5 py-4 text-center cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('defectHc')}>
                      <div className="flex items-center justify-center gap-1">Defect HC {sortConfig.key === 'defectHc' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 text-orange-500" /> : <ChevronDown className="w-3 h-3 text-orange-500" />) : <ArrowUpDown className="w-3 h-3 opacity-30" />}</div>
                    </th>
                    <th className="px-5 py-4 text-center cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('defectPct')}>
                      <div className="flex items-center justify-center gap-1">Defect % {sortConfig.key === 'defectPct' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 text-orange-500" /> : <ChevronDown className="w-3 h-3 text-orange-500" />) : <ArrowUpDown className="w-3 h-3 opacity-30" />}</div>
                    </th>
                    <th className="px-5 py-4 text-right cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('totalTarget')}>
                      <div className="flex items-center justify-end gap-1">Group Target {sortConfig.key === 'totalTarget' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 text-orange-500" /> : <ChevronDown className="w-3 h-3 text-orange-500" />) : <ArrowUpDown className="w-3 h-3 opacity-30" />}</div>
                    </th>
                    <th className="px-5 py-4 text-right cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('totalSales')}>
                      <div className="flex items-center justify-end gap-1">Group Sales {sortConfig.key === 'totalSales' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 text-orange-500" /> : <ChevronDown className="w-3 h-3 text-orange-500" />) : <ArrowUpDown className="w-3 h-3 opacity-30" />}</div>
                    </th>
                    <th className="px-5 py-4 text-right cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('groupMtdPct')}>
                      <div className="flex items-center justify-end gap-1">Group MTD% {sortConfig.key === 'groupMtdPct' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 text-orange-500" /> : <ChevronDown className="w-3 h-3 text-orange-500" />) : <ArrowUpDown className="w-3 h-3 opacity-30" />}</div>
                    </th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {centerStats.length > 0 ? centerStats.map((row, idx) => (
                    <tr key={idx} className="hover:bg-slate-50 transition-colors">
                      <td className="px-5 py-3 font-medium text-slate-800">{row.center}</td>
                      <td className="px-5 py-3 text-center">{row.hc}</td>
                      <td className="px-5 py-3 text-center font-bold text-red-600">{row.defectHc}</td>
                      <td className="px-5 py-3 text-center font-medium">{row.defectPct.toFixed(1)}%</td>
                      <td className="px-5 py-3 text-right">{formatValue(row.totalTarget, 'currency')}</td>
                      <td className="px-5 py-3 text-right">{formatValue(row.totalSales, 'currency')}</td>
                      <td className="px-5 py-3 text-right" style={getHighlightStyle(row.groupMtdPct, runRate, hlSettings)}>{row.groupMtdPct.toFixed(1)}%</td>
                    </tr>
                  )) : (
                    <tr><td colSpan={7} className="px-5 py-8 text-center text-slate-500">No data found for current filters.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </section>
        </div>
      );
    }

    // ------------------------------------------------------------------------------------
    // PAGE 3: TARGET COMMITMENT COMPONENT
    // ------------------------------------------------------------------------------------
    function TargetCommitment({ rawData, todayInfo, hlSettings, runRate }) {
      const [filterBrand, setFilterBrand] = useState('All');
      const [filterCenter, setFilterCenter] = useState('All');
      const [commitments, setCommitments] = useState({});
      
      const defaultWd = todayInfo?.workingDay?.mtd !== '?' ? Number(todayInfo?.workingDay?.mtd) : 1;
      const [designatedWd, setDesignatedWd] = useState(defaultWd);
      const [designatedEndWd, setDesignatedEndWd] = useState(defaultWd + 2);
      const [showTherapists, setShowTherapists] = useState(true);

      const availableCenters = useMemo(() => getUniqueValues(rawData.filter(d => filterBrand === 'All' || d.brand === filterBrand), 'center'), [rawData, filterBrand]);

      const fmDays = todayInfo?.workingDay?.fullMonth !== '?' ? Number(todayInfo?.workingDay?.fullMonth) : 30;

      const handleExpectedChange = (row, valStr) => {
         if (valStr === '') {
            setCommitments(prev => ({ ...prev, [row.id]: { expMtd: '', d1: '', d2: '' } }));
            return;
         }
         const val = parseFloat(valStr);
         if (isNaN(val)) return;

         const dailyFm = fmDays > 0 ? row.fmTarget / fmDays : 0;
         const targetBase = dailyFm * designatedEndWd;
         const requiredTotal = (val / 100) * targetBase;
         const needed = requiredTotal - row.actualSalesMtd;
         const half = needed > 0 ? needed / 2 : 0;
         
         setCommitments(prev => ({
            ...prev,
            [row.id]: { expMtd: valStr, d1: half.toFixed(0), d2: half.toFixed(0) }
         }));
      };

      const handleDayChange = (row, field, valStr) => {
         setCommitments(prev => {
            const current = prev[row.id] || { expMtd: '', d1: '', d2: '' };
            const newD1 = field === 'd1' ? valStr : current.d1;
            const newD2 = field === 'd2' ? valStr : current.d2;
            
            const numD1 = parseFloat(newD1) || 0;
            const numD2 = parseFloat(newD2) || 0;
            
            const dailyFm = fmDays > 0 ? row.fmTarget / fmDays : 0;
            const targetBase = dailyFm * designatedEndWd;
            const newExp = targetBase > 0 ? ((row.actualSalesMtd + numD1 + numD2) / targetBase) * 100 : 0;
            
            return {
               ...prev,
               [row.id]: { ...current, [field]: valStr, expMtd: newExp > 0 ? newExp.toFixed(2) : '' }
            };
         });
      };

      const groupedData = useMemo(() => {
        const validRows = rawData.filter(row => {
          if (!isValidTherapistRow(row)) return false;
          if (filterBrand !== 'All' && row.brand !== filterBrand) return false;
          if (filterCenter !== 'All' && row.center !== filterCenter) return false;
          return true;
        });

        const centersMap = new Map();
        validRows.forEach(row => {
          if (!centersMap.has(row.center)) {
             centersMap.set(row.center, { center: row.center, brand: row.brand, therapists: [] });
          }
          centersMap.get(row.center).therapists.push(row);
        });

        return Array.from(centersMap.values()).map(group => {
           const centerTotalRow = rawData.find(r => r.center.toLowerCase() === group.center.toLowerCase() && r.therapist.toLowerCase() === 'total');
           
           let cActualMtd = centerTotalRow ? centerTotalRow.actualSalesMtd : group.therapists.reduce((s, r) => s + r.actualSalesMtd, 0);
           let cMtdTarget = centerTotalRow ? centerTotalRow.mtdTarget : group.therapists.reduce((s, r) => s + r.mtdTarget, 0);
           let cFmTarget = centerTotalRow ? centerTotalRow.fmTarget : group.therapists.reduce((s, r) => s + r.fmTarget, 0);
           let cD1Sales = centerTotalRow ? centerTotalRow.t1Sales : group.therapists.reduce((s, r) => s + (r.t1Sales || 0), 0);
           let cD2Sales = centerTotalRow ? centerTotalRow.todaySales : group.therapists.reduce((s, r) => s + (r.todaySales || 0), 0);

           let cD1Target = 0;
           let cD2Target = 0;
           
           group.therapists.forEach(t => {
              const cmt = commitments[t.id] || {};
              cD1Target += parseFloat(cmt.d1) || 0;
              cD2Target += parseFloat(cmt.d2) || 0;
           });

           const dailyFm = fmDays > 0 ? cFmTarget / fmDays : 0;
           const targetBase = dailyFm * designatedEndWd;
           const cExpMtd = targetBase > 0 ? ((cActualMtd + cD1Target + cD2Target) / targetBase) * 100 : 0;

           return {
              ...group,
              cActualMtd, cMtdTarget, cFmTarget, cD1Sales, cD2Sales, cD1Target, cD2Target, cExpMtd
           };
        });
      }, [rawData, filterBrand, filterCenter, commitments, fmDays, designatedEndWd]);

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-5 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-700 font-semibold">
                <Target className="w-5 h-5 text-rose-500" />
                <h2>Daily Target Commitments</h2>
              </div>
            </div>
            
            <div className="p-5 border-b border-slate-200 flex flex-col xl:flex-row gap-4 justify-between xl:items-center">
              <div className="flex flex-wrap gap-4 items-center">
                <select className="bg-white border border-slate-200 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-rose-500 shadow-sm text-sm" value={filterBrand} onChange={(e) => { setFilterBrand(e.target.value); setFilterCenter('All'); }}>
                  <option value="All">All Brands</option>
                  {getUniqueValues(rawData, 'brand').map(b => <option key={b} value={b} className="capitalize">{b}</option>)}
                </select>
                <select className="bg-white border border-slate-200 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-rose-500 shadow-sm disabled:opacity-50 text-sm" value={filterCenter} onChange={(e) => setFilterCenter(e.target.value)} disabled={availableCenters.length === 0}>
                  <option value="All">All Centers</option>
                  {availableCenters.map(f => <option key={f} value={f}>{f}</option>)}
                </select>
                
                <div className="hidden sm:block w-px h-6 bg-slate-300"></div>

                <div className="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-lg text-sm shadow-sm">
                  <label className="font-semibold text-slate-700">Designated WD:</label>
                  <input type="number" className="w-12 outline-none text-center bg-slate-50 border border-slate-200 rounded font-bold focus:ring-2 focus:ring-rose-500" value={designatedWd} onChange={e => setDesignatedWd(Number(e.target.value))} />
                </div>
                <div className="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-lg text-sm shadow-sm">
                  <label className="font-semibold text-slate-700">End WD:</label>
                  <input type="number" className="w-12 outline-none text-center bg-slate-50 border border-slate-200 rounded font-bold focus:ring-2 focus:ring-rose-500" value={designatedEndWd} onChange={e => setDesignatedEndWd(Number(e.target.value))} />
                </div>

                <div className="hidden sm:block w-px h-6 bg-slate-300"></div>

                <label className="flex items-center gap-2 text-sm font-semibold text-slate-700 cursor-pointer select-none">
                  <input type="checkbox" className="w-4 h-4 rounded text-rose-500 focus:ring-rose-500 focus:ring-2 border-slate-300 cursor-pointer" checked={showTherapists} onChange={e => setShowTherapists(e.target.checked)} />
                  Show Therapist Details
                </label>
              </div>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left text-sm text-slate-600 whitespace-nowrap">
                <thead className="bg-slate-100 text-slate-600 uppercase text-[10px] font-bold border-b border-slate-200">
                  <tr>
                    <th className="px-3 py-3">Brand</th>
                    <th className="px-3 py-3">Center</th>
                    <th className="px-3 py-3 text-center">PIC</th>
                    <th className="px-3 py-3">Therapist</th>
                    <th className="px-3 py-3">Position</th>
                    <th className="px-3 py-3 text-center" title="Sales | MTD Target | FM Target">Sales <span className="opacity-30">|</span> MTD Target <span className="opacity-30">|</span> FM Target</th>
                    <th className="px-3 py-3 text-right">Remaining</th>
                    <th className="px-3 py-3 text-center bg-blue-100/50">Exp. MTD%</th>
                    <th className="px-3 py-3 text-center bg-indigo-100/50">Day 1 Target</th>
                    <th className="px-3 py-3 text-right">Day 1 Sales</th>
                    <th className="px-3 py-3 text-right border-r border-slate-200">D1 Fulfill%</th>
                    <th className="px-3 py-3 text-center bg-indigo-100/50">Day 2 Target</th>
                    <th className="px-3 py-3 text-right">Day 2 Sales</th>
                    <th className="px-3 py-3 text-right">D2 Fulfill%</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {groupedData.length === 0 ? (
                    <tr><td colSpan="14" className="px-5 py-8 text-center text-slate-500">No therapists found for this filter.</td></tr>
                  ) : (
                    groupedData.map((group, gIdx) => (
                      <React.Fragment key={`group-${gIdx}`}>
                        {/* Center Summary Row */}
                        <tr className="bg-slate-50/80 font-bold text-slate-800 border-t-2 border-slate-200">
                          <td className="px-3 py-3">{group.brand}</td>
                          <td className="px-3 py-3 text-rose-600">{group.center}</td>
                          <td className="px-3 py-3 text-center">-</td>
                          <td className="px-3 py-3 uppercase text-[11px] tracking-wider text-slate-500">Center Total</td>
                          <td className="px-3 py-3">-</td>
                          <td className="px-3 py-3 text-center">{formatShortNum(group.cActualMtd, '$')} <span className="opacity-30">|</span> {formatShortNum(group.cMtdTarget, '$')} <span className="opacity-30">|</span> {formatShortNum(group.cFmTarget, '$')}</td>
                          <td className="px-3 py-3 text-right">{formatValue(Math.max(0, group.cFmTarget - group.cActualMtd), 'currency')}</td>
                          <td className="px-3 py-3 text-center text-blue-700 bg-blue-50" style={getHighlightStyle(group.cExpMtd, runRate, hlSettings)}>{group.cExpMtd.toFixed(1)}%</td>
                          <td className="px-3 py-3 text-center text-indigo-700 bg-indigo-50">{formatValue(group.cD1Target, 'currency')}</td>
                          <td className="px-3 py-3 text-right">{formatValue(group.cD1Sales, 'currency')}</td>
                          <td className="px-3 py-3 text-right border-r border-slate-200" style={group.cD1Target > 0 ? {color: (group.cD1Sales/group.cD1Target)>=1 ? '#16a34a' : '#dc2626'} : {}}>{group.cD1Target > 0 ? ((group.cD1Sales / group.cD1Target)*100).toFixed(1) + '%' : '-'}</td>
                          <td className="px-3 py-3 text-center text-indigo-700 bg-indigo-50">{formatValue(group.cD2Target, 'currency')}</td>
                          <td className="px-3 py-3 text-right">{formatValue(group.cD2Sales, 'currency')}</td>
                          <td className="px-3 py-3 text-right" style={group.cD2Target > 0 ? {color: (group.cD2Sales/group.cD2Target)>=1 ? '#16a34a' : '#dc2626'} : {}}>{group.cD2Target > 0 ? ((group.cD2Sales / group.cD2Target)*100).toFixed(1) + '%' : '-'}</td>
                        </tr>
                        
                        {/* Therapist Rows */}
                        {showTherapists && group.therapists.map(t => {
                           const cmt = commitments[t.id] || { expMtd: '', d1: '', d2: '' };
                           const d1Val = parseFloat(cmt.d1) || 0;
                           const d2Val = parseFloat(cmt.d2) || 0;
                           const d1Sales = t.t1Sales || 0;
                           const d2Sales = t.todaySales || 0;
                           
                           return (
                             <tr key={t.id} className="bg-white hover:bg-slate-50 transition-colors">
                               <td className="px-3 py-2 text-slate-400 text-xs">{t.brand}</td>
                               <td className="px-3 py-2 text-slate-400 text-xs">{t.center}</td>
                               <td className="px-3 py-2 text-center text-slate-400">-</td>
                               <td className="px-3 py-2 font-medium text-slate-700">{t.therapist}</td>
                               <td className="px-3 py-2 text-[11px] text-slate-500">{t.position}</td>
                               <td className="px-3 py-2 text-center text-slate-500">{formatShortNum(t.actualSalesMtd, '$')} <span className="opacity-30">|</span> {formatShortNum(t.mtdTarget, '$')} <span className="opacity-30">|</span> {formatShortNum(t.fmTarget, '$')}</td>
                               <td className="px-3 py-2 text-right">{formatValue(Math.max(0, t.fmTarget - t.actualSalesMtd), 'currency')}</td>
                               <td className="px-2 py-1 text-center bg-blue-50/30">
                                  <div className="relative flex items-center justify-center">
                                    <input type="number" className="w-16 pl-1 pr-4 py-1 text-center text-xs font-bold border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 text-blue-700 outline-none" value={cmt.expMtd} onChange={(e) => handleExpectedChange(t, e.target.value)} />
                                    <span className="absolute right-[0.35rem] text-[10px] font-bold text-blue-400 pointer-events-none">%</span>
                                  </div>
                               </td>
                               <td className="px-2 py-1 text-center bg-indigo-50/30">
                                  <div className="relative flex items-center justify-center">
                                    <span className="absolute left-[0.35rem] text-[10px] font-bold text-indigo-400 pointer-events-none">$</span>
                                    <input type="number" className="w-20 pl-3 pr-1 py-1 text-center text-xs font-bold border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 text-indigo-700 outline-none" value={cmt.d1} onChange={(e) => handleDayChange(t, 'd1', e.target.value)} />
                                  </div>
                               </td>
                               <td className="px-3 py-2 text-right">{formatValue(d1Sales, 'currency')}</td>
                               <td className="px-3 py-2 text-right font-bold text-xs border-r border-slate-100" style={d1Val > 0 ? {color: (d1Sales/d1Val)>=1 ? '#16a34a' : '#dc2626'} : {}}>{d1Val > 0 ? ((d1Sales / d1Val)*100).toFixed(1) + '%' : '-'}</td>
                               <td className="px-2 py-1 text-center bg-indigo-50/30">
                                  <div className="relative flex items-center justify-center">
                                    <span className="absolute left-[0.35rem] text-[10px] font-bold text-indigo-400 pointer-events-none">$</span>
                                    <input type="number" className="w-20 pl-3 pr-1 py-1 text-center text-xs font-bold border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 text-indigo-700 outline-none" value={cmt.d2} onChange={(e) => handleDayChange(t, 'd2', e.target.value)} />
                                  </div>
                               </td>
                               <td className="px-3 py-2 text-right">{formatValue(d2Sales, 'currency')}</td>
                               <td className="px-3 py-2 text-right font-bold text-xs" style={d2Val > 0 ? {color: (d2Sales/d2Val)>=1 ? '#16a34a' : '#dc2626'} : {}}>{d2Val > 0 ? ((d2Sales / d2Val)*100).toFixed(1) + '%' : '-'}</td>
                             </tr>
                           )
                        })}
                      </React.Fragment>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </section>
        </div>
      );
    }

    // ------------------------------------------------------------------------------------
    // PAGE 4: SETTINGS COMPONENT (MTD% Highlight Colors)
    // ------------------------------------------------------------------------------------

      const updateSetting = (key, field, value) => {
        setHlSettings(prev => ({
          ...prev,
          [key]: { ...prev[key], [field]: value }
        }));
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-300 max-w-4xl mx-auto">
          <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-5 border-b border-slate-200 bg-slate-50 flex items-center gap-2">
               <Palette className="w-5 h-5 text-purple-600" />

                     <span className="font-bold text-slate-700 w-16">Rule 1:</span>
                     <span className="font-medium">If MTD% is</span>

                     <span className="bg-slate-200 px-2 py-1 rounded text-slate-700">Run Rate</span>
                     <span>&times;</span>
                     <input type="number" step="0.1" value={hlSettings.rule1.multiplier} onChange={(e) => updateSetting('rule1', 'multiplier', Number(e.target.value))} className="w-20 px-2 py-1 outline-none text-center font-bold rounded border border-slate-300 focus:border-blue-500" />
                   </div>
                   <div className="flex items-center gap-2">
                     <label className="font-medium text-slate-500">Color:</label>

                 {/* RULE 2 */}
                 <div className="flex items-center gap-4 bg-slate-50 p-4 rounded-lg border border-slate-200">
                   <div className="flex-1 flex items-center gap-3">
                     <span className="font-bold text-slate-700 w-16">Rule 2:</span>
                     <span className="font-medium">If MTD% is</span>
                     <span className="font-bold">&ge;</span>
                     <span className="bg-slate-200 px-2 py-1 rounded text-slate-700">Run Rate</span>
                     <span>&times;</span>
                     <input type="number" step="0.1" value={hlSettings.rule2.multiplier} onChange={(e) => updateSetting('rule2', 'multiplier', Number(e.target.value))} className="w-20 px-2 py-1 outline-none text-center font-bold rounded border border-slate-300 focus:border-blue-500" />
                   </div>
                   <div className="flex items-center gap-2">
                     <label className="font-medium text-slate-500">Color:</label>
                     <input type="color" value={hlSettings.rule2.color} onChange={(e) => updateSetting('rule2', 'color', e.target.value)} className="w-10 h-10 rounded cursor-pointer border-0 bg-transparent p-0" />
                   </div>

                 {/* RULE 3 */}
                 <div className="flex items-center gap-4 bg-slate-50 p-4 rounded-lg border border-slate-200">
                   <div className="flex-1 flex items-center gap-3">
                     <span className="font-bold text-slate-700 w-16">Rule 3:</span>
                     <span className="font-medium">If MTD% is</span>
                     <span className="font-bold">&ge;</span>
                     <span className="bg-slate-200 px-2 py-1 rounded text-slate-700">Run Rate</span>
                     <span>&times;</span>
                     <input type="number" step="0.1" value={hlSettings.rule3.multiplier} onChange={(e) => updateSetting('rule3', 'multiplier', Number(e.target.value))} className="w-20 px-2 py-1 outline-none text-center font-bold rounded border border-slate-300 focus:border-blue-500" />

                     <span className="font-bold text-slate-700 w-16">Rule 4:</span>
                     <span className="font-medium">If MTD% is</span>

                     <input type="number" value={hlSettings.rule4.value} onChange={(e) => updateSetting('rule4', 'value', Number(e.target.value))} className="w-20 px-2 py-1 outline-none text-center font-bold rounded border border-slate-300 focus:border-blue-500" />

    }

    // ------------------------------------------------------------------------------------
    // MAIN APP COMPONENT WITH SIDEBAR LAYOUT
    // ------------------------------------------------------------------------------------
    function App() {
      const [activeTab, setActiveTab] = useState('sales');
      const [data, setData] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [fetchError, setFetchError] = useState('');
      const [lastRefreshTime, setLastRefreshTime] = useState(null);
      
      const [todayInfo, setTodayInfo] = useState({ display: '', workingDay: { mtd: '?', fullMonth: '?' }, isBeforeNoon: false });
      const workingDayMapRef = useRef({});

      // Settings State for Dynamic Highlighting updated to sensible top-down cascade logical order
      const [highlightSettings, setHighlightSettings] = useState({
        rule1: { multiplier: 2, color: '#6b21a8' }, // Dark Purple
        rule2: { multiplier: 1.5, color: '#c084fc' }, // Light Purple
        rule3: { multiplier: 1, color: '#2563eb' }, // Blue
        rule4: { value: 100, color: '#16a34a' }, // Deep Neon Green
        rule5: { value: 90, color: '#eab308' }, // Yellow
        rule6: { color: '#dc2626' } // Red
      });

      // User defines run rate as Target Extrapolation (Total WD / Current WD) eg. 26/15 = 173%
      const mtdDay = todayInfo?.workingDay?.mtd !== '?' ? Number(todayInfo?.workingDay?.mtd) : 1;
      const fmDay = todayInfo?.workingDay?.fullMonth !== '?' ? Number(todayInfo?.workingDay?.fullMonth) : 1;
      const globalRunRate = mtdDay > 0 ? (fmDay / mtdDay) * 100 : 100;

      const formatRefreshTime = () => {
        const d = new Date();
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const timeStr = d.toLocaleTimeString('en-US', { timeZone: 'Asia/Hong_Kong', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        return `${dd}/${mm} ${timeStr} HKT`;
      };
      
      useEffect(() => {
        const SHEET_ID = '1fueysQjwsNx7Xt5vbKwde4ZF9rLBDWyLkVSmuuj2QBo';
        const SALES_SHEET_NAME = 'HK Autosync Commitment';
        const WD_SHEET_NAME = 'HK Working Day';
        const SALES_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SALES_SHEET_NAME)}`;
        const WD_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(WD_SHEET_NAME)}`;
        
        const fetchAllData = async () => {
          try {
            const wdRes = await fetch(WD_CSV_URL);
            if (wdRes.ok) {
              const wdText = await wdRes.text();
              const map = parseWorkingDays(wdText);
              workingDayMapRef.current = map;
              setTodayInfo(getTodayInfo(map));
            }

            const salesRes = await fetch(SALES_CSV_URL);
            if (!salesRes.ok) throw new Error('Network response was not ok');
            const text = await salesRes.text();
            const parsedData = parseCSV(text);
            if (parsedData.length > 0) {
              setData(parsedData);
              setLastRefreshTime(formatRefreshTime());
            } else {
              setFetchError("File parsed, but no valid sales data rows were found.");
            }
          } catch (err) {
            console.error("Failed to auto-fetch sheets:", err);
            setFetchError("Unable to auto-sync with the Google Sheet. Please use the upload button.");
          } finally {
            setIsLoading(false);
          }
        };

        fetchAllData();

        const interval = setInterval(() => {
          setTodayInfo(getTodayInfo(workingDayMapRef.current));
        }, 60000);
        return () => clearInterval(interval);
      }, []);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const parsedData = parseCSV(event.target.result);
          setData(parsedData);
          setLastRefreshTime(formatRefreshTime());
        };
        reader.readAsText(file);
      };

      return (
        <div className="flex h-screen bg-slate-50 text-slate-800 font-sans selection:bg-blue-200 overflow-hidden">
          
          <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0 z-20">
            <div className="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-950/50">
              <TrendingUp className="w-6 h-6 text-blue-500 mr-3" />
              <h1 className="text-lg font-bold text-white tracking-tight">Performance</h1>
            </div>
            
            <div className="p-4 space-y-1 flex-1">
              <button onClick={() => setActiveTab('sales')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium ${activeTab === 'sales' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <LayoutDashboard className="w-4 h-4" /> Sales Overview
              </button>
              <button onClick={() => setActiveTab('cat12')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium ${activeTab === 'cat12' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <FileText className="w-4 h-4" /> CAT 1/2
              </button>
              <button onClick={() => setActiveTab('target')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium ${activeTab === 'target' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <Target className="w-4 h-4" /> Target Commitment
              </button>
              <div className="my-2 border-t border-slate-800 pt-2"></div>
              <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium ${activeTab === 'settings' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                <Settings className="w-4 h-4" /> Settings
              </button>
            </div>
            <div className="p-4 border-t border-slate-800 text-xs text-slate-500">HK Autosync Tracker v2.0</div>
          </aside>

          <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
            
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0 z-10 shadow-sm">
              <h2 className="text-xl font-bold text-slate-800 tracking-tight">
                {activeTab === 'sales' ? 'HK Autosync Commit. Tracker' : activeTab === 'cat12' ? 'CAT 1/2 Tracker' : activeTab === 'target' ? 'Target Commitment' : 'System Settings'}
              </h2>
              
              <div className="flex flex-col items-end justify-center">
                <div className="flex items-center gap-3 mb-1">
                  <button onClick={() => window.location.reload()} className="p-2 text-slate-400 hover:text-blue-600 transition-colors" title="Force Sync">
                    <RefreshCw className="w-5 h-5" />
                  </button>
                  <label className="cursor-pointer bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium shadow-sm transition-colors flex items-center gap-2">
                    <Upload className="w-4 h-4" />
                    CSV Upload
                    <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                  </label>
                  {todayInfo.display && (
                    <div className="flex items-center gap-2 bg-blue-50 border border-blue-100 text-blue-700 px-3 py-1.5 rounded-lg shadow-sm" title={todayInfo.isBeforeNoon ? "Showing yesterday's working day because it is before 12:00 PM HKT" : "Showing current working day"}>
                      <CalendarDays className="w-4 h-4" />
                      <span className="text-sm font-semibold">Today: {todayInfo.display} | WD: {todayInfo.workingDay.mtd} / {todayInfo.workingDay.fullMonth}</span>
                    </div>
                  )}
                </div>
                {lastRefreshTime && (
                  <div className="flex items-center gap-1 text-xs text-slate-500 font-medium mr-1">
                    <Clock className="w-3 h-3" /> Last Synced: {lastRefreshTime}
                  </div>
                )}
              </div>
            </header>

            <main className="flex-1 overflow-auto px-8 py-8 relative">
              {isLoading ? (
                <div className="flex flex-col items-center justify-center h-[60vh] border-2 border-dashed border-slate-300 rounded-xl bg-white shadow-sm">
                   <div className="w-12 h-12 text-blue-500 mb-4 animate-spin rounded-full border-4 border-blue-500 border-t-transparent"></div>
                   <h3 className="text-xl font-bold text-slate-800 mb-2">Syncing with Google Sheets...</h3>
                   <p className="text-slate-500">Fetching live data from your HK Autosync link.</p>
                </div>
              ) : data.length === 0 ? (
                <div className="flex flex-col items-center justify-center h-[60vh] border-2 border-dashed border-slate-300 rounded-xl bg-white shadow-sm">
                   <AlertTriangle className="w-12 h-12 text-orange-500 mb-4" />
                   <h3 className="text-xl font-bold text-slate-800 mb-2">No Live Data Connected</h3>
                   <p className="text-slate-500 text-center max-w-md mb-6">
                     {fetchError || 'Unable to load data. Please manually upload the exported CSV using the green button.'}
                   </p>
                </div>
              ) : (
                activeTab === 'sales' ? <SalesOverview rawData={data} todayInfo={todayInfo} hlSettings={highlightSettings} runRate={globalRunRate} /> : 
                activeTab === 'cat12' ? <Cat12Overview rawData={data} hlSettings={highlightSettings} runRate={globalRunRate} /> :
                activeTab === 'target' ? <TargetCommitment rawData={data} todayInfo={todayInfo} hlSettings={highlightSettings} runRate={globalRunRate} /> :
                <SettingsOverview hlSettings={highlightSettings} setHlSettings={setHighlightSettings} />
              )}
            </main>

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
